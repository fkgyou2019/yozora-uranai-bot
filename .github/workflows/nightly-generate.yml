name: Nightly Queue Generation

on:
  schedule:
    # 毎日23:05 JST (14:05 UTC) に翌日分の投稿キューを事前生成（23:00のpost-health-checkと5分ずらし）
    - cron: '5 14 * * *'
  workflow_dispatch:  # 手動実行も可

permissions:
  contents: write

concurrency:
  group: nightly-generate
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install gspread google-auth || true

      - name: Initialize state files if missing
        run: |
          mkdir -p state config
          [ ! -f state/post-queue.json ] && echo '{"queue":[]}' > state/post-queue.json
          [ ! -f state/post-history.json ] && echo '{"posts":[]}' > state/post-history.json
          [ ! -f state/winning-patterns.json ] && echo '{}' > state/winning-patterns.json
          [ ! -f state/performance-data.json ] && echo '{"posts":[],"last_updated":null}' > state/performance-data.json
          true

      - name: Create api-keys.env from secrets
        run: |
          cat > config/api-keys.env << EOF
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          THREADS_ACCESS_TOKEN=${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID=${{ secrets.THREADS_USER_ID }}
          EOF

      # ========================================
      # キュー残量チェック: 翌日分を確保
      # 再現性テスト期間（4/6-4/30 JST）: 7件以上確保（構造G×5+F×2）
      # 通常モード: 5件以上確保
      # ========================================
      - name: Check queue and generate if needed
        run: |
          REMAINING=$(python -c "
          import json, os
          path = 'state/post-queue.json'
          q = json.load(open(path)) if os.path.exists(path) else {'queue': []}
          print(len([p for p in q.get('queue', []) if p.get('status') == 'queued']))
          " 2>/dev/null || echo "0")
          echo "現在のキュー残: ${REMAINING}件"

          EXPERIMENT_MODE=1
          THRESHOLD=7
          echo "EXPERIMENT_MODE=1 固定: 7件以上確保します"

          if [ "$REMAINING" -lt "$THRESHOLD" ]; then
            echo "キュー不足 → 生成します"
            EXPERIMENT_MODE=$EXPERIMENT_MODE python .github/scripts/generate_posts.py
            python .github/scripts/quality_check.py || true

            NEW_REMAINING=$(python -c "
          import json, os
          path = 'state/post-queue.json'
          q = json.load(open(path)) if os.path.exists(path) else {'queue': []}
          print(len([p for p in q.get('queue', []) if p.get('status') == 'queued']))
          " 2>/dev/null || echo "0")
            echo "生成後キュー残: ${NEW_REMAINING}件"

            # 通常モード時のみ: それでも3件未満なら再生成（品質チェックで落ちた場合）
            if [ "$EXPERIMENT_MODE" = "0" ] && [ "$NEW_REMAINING" -lt "3" ]; then
              echo "品質チェック後も不足 → 再生成"
              python .github/scripts/generate_posts.py
              python .github/scripts/quality_check.py || true
            fi
          else
            echo "キュー十分（${REMAINING}件）→ 生成スキップ"
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONIOENCODING: utf-8

      # ========================================
      # Googleスプレッドシートにレビュー用データを書き込む
      # GOOGLE_SHEETS_CREDENTIALS が設定されていない場合はスキップ（エラーにしない）
      # ========================================
      - name: Write posts to Google Sheets (review dashboard)
        run: python .github/scripts/write_to_sheets.py || true
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          PYTHONIOENCODING: utf-8
        continue-on-error: true

      # ========================================
      # 状態をコミット
      # ========================================
      - name: Commit state changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/post-queue.json state/winning-patterns.json state/cta-state.json || true
          if git diff --cached --quiet; then
            echo "No queue changes to commit"
          else
            git commit -m "chore: nightly queue generation [skip ci]"
            git push || (
              git fetch origin master
              git merge origin/master -X ours --no-edit
              git push
            )
          fi
