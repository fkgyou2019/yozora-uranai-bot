name: Buzz Learn (Collect & Analyze & Improve)

on:
  schedule:
    # 毎朝5:47 JST (20:47 UTC前日) に実行
    # daily-learn.yml (6:03 JST) の前に完了させる
    # GitHub Actions cron はバックアップ（cron-job.orgからの workflow_dispatch が主）
    - cron: '47 20 * * *'
  workflow_dispatch:  # 手動実行 & cron-job.orgトリガー

permissions:
  contents: write

concurrency:
  group: buzz-learn
  cancel-in-progress: true

jobs:
  buzz-learn:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Initialize state files if missing
        run: |
          mkdir -p state
          [ ! -f state/buzz-collection.json ] && echo '{"posts":[],"sources":{}}' > state/buzz-collection.json
          [ ! -f state/buzz-analysis.json ] && echo '{"analysis":{},"history":[]}' > state/buzz-analysis.json
          [ ! -f state/buzz-manual-input.json ] && echo '{"posts":[]}' > state/buzz-manual-input.json
          [ ! -f state/improvement-log.json ] && echo '{"improvements":[],"total_improvements":0}' > state/improvement-log.json
          [ ! -f state/winning-patterns.json ] && echo '{}' > state/winning-patterns.json
          true

      - name: Create api-keys.env from secrets
        run: |
          cat > config/api-keys.env << EOF
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          THREADS_ACCESS_TOKEN=${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID=${{ secrets.THREADS_USER_ID }}
          X_BEARER_TOKEN=${{ secrets.X_BEARER_TOKEN }}
          EOF

      - name: Step 1 - Collect buzz posts
        run: python agents/buzz_collector.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          X_API_PLAN: ${{ vars.X_API_PLAN || 'payperuse' }}
          THREADS_API_LEVEL: ${{ vars.THREADS_API_LEVEL || 'standard' }}

      - name: Step 2 - Analyze buzz posts with Claude
        run: python .github/scripts/buzz_analyzer.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Step 3 - Improve templates
        run: python .github/scripts/template_improver.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/buzz-collection.json state/buzz-analysis.json state/improvement-log.json state/buzz-manual-input.json knowledge/uranai/hook-lines.json state/winning-patterns.json
          if git diff --cached --quiet; then
            echo "No buzz learning changes"
          else
            git commit -m "chore: buzz learn - collect, analyze, improve [skip ci]"
            git push || (git pull --rebase origin master && git push)
          fi
