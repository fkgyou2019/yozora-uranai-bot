name: Post Health Check

on:
  schedule:
    # 2時間ごとに実行（JST 7:00〜23:00）= 1日9回
    # 削除されたら次のチェックで即再投稿（最大2h待ち）
    - cron: '0 22 * * *'   #  7:00 JST
    - cron: '0 0 * * *'    #  9:00 JST
    - cron: '0 2 * * *'    # 11:00 JST
    - cron: '0 4 * * *'    # 13:00 JST
    - cron: '0 6 * * *'    # 15:00 JST
    - cron: '0 8 * * *'    # 17:00 JST
    - cron: '0 10 * * *'   # 19:00 JST
    - cron: '0 12 * * *'   # 21:00 JST
    - cron: '0 14 * * *'   # 23:00 JST
  workflow_dispatch:  # 手動実行も引き続き可

permissions:
  contents: write

concurrency:
  group: post-health-check
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check active period (JST 2026-03-31 ~ 2026-04-30)
        id: period_check
        run: |
          JST_DATE=$(TZ='Asia/Tokyo' date +%Y-%m-%d)
          if [[ "$JST_DATE" < "2026-03-31" || "$JST_DATE" > "2026-04-30" ]]; then
            echo "稼働期間外 ($JST_DATE)。スキップします。"
            echo "in_period=false" >> $GITHUB_OUTPUT
          else
            echo "稼働期間内 ($JST_DATE)。ヘルスチェックを実行します。"
            echo "in_period=true" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository
        if: steps.period_check.outputs.in_period == 'true'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        if: steps.period_check.outputs.in_period == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create api-keys.env from secrets
        if: steps.period_check.outputs.in_period == 'true'
        run: |
          mkdir -p config state
          cat > config/api-keys.env << EOF
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          THREADS_ACCESS_TOKEN=${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID=${{ secrets.THREADS_USER_ID }}
          EOF

      # ========================================
      # Step 1: ヘルスチェック（RED判定 + 削除試行）
      # ========================================
      - name: Run health check (detect & delete bad posts)
        if: steps.period_check.outputs.in_period == 'true'
        run: python .github/scripts/post_health_check.py
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}

      # ========================================
      # Step 2: RED投稿ぶんを即時代替投稿（投稿数を守る）
      # ★ 削除成否に関わらず実行（pending-deletionsが後で片付ける）
      # ========================================
      - name: Repost to replace bad posts (FORCE_POST mode)
        if: steps.period_check.outputs.in_period == 'true'
        run: |
          if [ ! -f state/needs-repost.flag ]; then
            echo "再投稿不要（RED判定なし）"
            exit 0
          fi

          COUNT=$(cat state/needs-repost.flag)
          echo "========================================"
          echo "[REPOST] ${COUNT}件のREDを検出 → 代替投稿を開始"
          echo "========================================"

          for i in $(seq 1 $COUNT); do
            echo ""
            echo "--- [REPOST ${i}/${COUNT}] ---"

            # キューが空なら再生成
            REMAINING=$(python -c "
          import json, os
          path = 'state/post-queue.json'
          q = json.load(open(path)) if os.path.exists(path) else {'queue': []}
          print(len([p for p in q.get('queue', []) if p.get('status') == 'queued']))
          ")
            echo "キュー残: ${REMAINING}件"

            if [ "$REMAINING" = "0" ]; then
              echo "キューが空 → 新規生成します"
              EXPERIMENT_MODE=1 python .github/scripts/generate_posts.py
              python .github/scripts/quality_check.py || true
            fi

            # FORCE_POST=1 で投稿間隔チェックをスキップして即時投稿
            FORCE_POST=1 python agents/poster.py

            # 連続投稿回避（Threadsのスパム判定を防ぐ）
            if [ "$i" -lt "$COUNT" ]; then
              echo "次の投稿まで10秒待機..."
              sleep 10
            fi
          done

          rm -f state/needs-repost.flag
          echo ""
          echo "========================================"
          echo "[REPOST] 完了: ${COUNT}件の代替投稿を実行"
          echo "========================================"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          PYTHONIOENCODING: utf-8

      # ========================================
      # Step 3: 状態をコミット
      # ========================================
      - name: Commit state changes
        if: steps.period_check.outputs.in_period == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/health-check-log.json state/post-queue.json state/post-history.json \
                  state/system-status.json state/pending-deletions.json \
                  state/delete-rate.json \
                  state/performance-data.json state/winning-patterns.json || true
          if git diff --cached --quiet; then
            echo "No state changes"
          else
            git commit -m "chore: health check + repost [skip ci]"
            git push || (
              git fetch origin master
              git merge origin/master -X ours --no-edit
              git push
            )
          fi
