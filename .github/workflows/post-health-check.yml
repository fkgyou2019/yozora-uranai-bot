name: Post Health Check

on:
  schedule:
    # 2時間ごとに実行（JST 7:00〜23:00）= 1日9回
    # 削除されたら次のチェックで即再投稿（最大2h待ち）
    - cron: '0 22 * * *'   #  7:00 JST
    - cron: '0 0 * * *'    #  9:00 JST
    - cron: '0 2 * * *'    # 11:00 JST
    - cron: '0 4 * * *'    # 13:00 JST
    - cron: '0 6 * * *'    # 15:00 JST
    - cron: '0 8 * * *'    # 17:00 JST
    - cron: '0 10 * * *'   # 19:00 JST
    - cron: '0 12 * * *'   # 21:00 JST
    - cron: '0 14 * * *'   # 23:00 JST
  workflow_dispatch:  # 手動実行も引き続き可

permissions:
  contents: write

concurrency:
  group: post-health-check
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python

        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create api-keys.env from secrets

        run: |
          mkdir -p config state
          cat > config/api-keys.env << EOF
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          THREADS_ACCESS_TOKEN=${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID=${{ secrets.THREADS_USER_ID }}
          EOF

      # ========================================
      # Step 1: ヘルスチェック（RED判定 + 削除試行）
      # ========================================
      - name: Run health check (detect & delete bad posts)

        run: python .github/scripts/post_health_check.py
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}

      # ========================================
      # ⚠️ Step 2 REPOST は廃止済み（2026-04-14）
      # 理由: FORCE_POST=1 がスケジュール無視で未来スロットのキュー内容を
      #       誤った時刻に消費し、7スロット計画を壊す不具合が判明。
      #       experiment-hourly.yml が空キュー補充 + post-verify バックアップを
      #       すでに持っているため、REPOST 機構は不要かつ有害。
      #       ヘルスチェックは「検知・削除のみ」に限定する。
      # ========================================

      # ========================================
      # Step 3: 状態をコミット
      # ========================================
      - name: Commit state changes

        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/health-check-log.json state/post-queue.json state/post-history.json \
                  state/system-status.json state/pending-deletions.json \
                  state/delete-rate.json \
                  state/performance-data.json state/winning-patterns.json || true
          if git diff --cached --quiet; then
            echo "No state changes"
          else
            git commit -m "chore: health check + repost [skip ci]"
            git push || (
              git fetch origin master
              git merge origin/master -X ours --no-edit
              git push
            )
          fi
