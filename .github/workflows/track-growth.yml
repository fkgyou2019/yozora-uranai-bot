name: Track Post Growth (毎時スナップショット)

on:
  schedule:
    - cron: '30 * * * *'  # 毎時30分に実行（experiment-hourly.ymlの7分と競合しない）
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: track-growth
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create api-keys.env from secrets
        run: |
          mkdir -p config
          cat > config/api-keys.env << EOF
          THREADS_ACCESS_TOKEN=${{ secrets.THREADS_ACCESS_TOKEN }}
          EOF

      - name: Initialize tracker file if missing
        run: |
          mkdir -p state/reports
          if [ ! -f state/post-growth-tracker.json ]; then
            echo '{"snapshots":{},"last_updated":null}' > state/post-growth-tracker.json
          fi

      - name: Run growth tracker
        run: python .github/scripts/track_hourly_growth.py
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        continue-on-error: true

      - name: Commit growth data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/post-growth-tracker.json state/reports/ || true
          if git diff --cached --quiet; then
            echo "No growth data changes to commit"
          else
            git commit -m "chore: update growth tracker [skip ci]"
            git push || (
              git fetch origin master
              git merge origin/master -X ours --no-edit
              git push
            )
          fi
