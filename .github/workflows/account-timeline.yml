name: Account Timeline Collector (競合アカウント時系列)

on:
  schedule:
    # 毎日 09:00 JST と 21:00 JST
    - cron: '0 0 * * *'
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      target_handle:
        description: '特定ハンドルのみ実行（例: shihoriiinu）空欄で全件'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-playwright

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright gspread google-auth
          python -m playwright install chromium --with-deps

      - name: Run collector
        env:
          THREADS_API_LEVEL: ${{ secrets.THREADS_API_LEVEL }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: |
          if [ -n "${{ github.event.inputs.target_handle }}" ]; then
            python agents/account_timeline_collector.py "@${{ github.event.inputs.target_handle }}"
          else
            python agents/account_timeline_collector.py
          fi

      - name: Extract competitor buzz patterns
        run: |
          python .github/scripts/extract_competitor_buzz.py
        continue-on-error: true

      - name: Export to Google Sheets
        run: |
          python .github/scripts/export_to_sheets.py
        continue-on-error: true
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}

      - name: Generate comment suggestions
        run: |
          python .github/scripts/generate_comment_suggestions.py
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}

      - name: Commit timeline data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/account-timeline.json state/competitor-buzz-references.json state/competitor-buzz-trend.json state/comment-suggestions.json
          if git diff --staged --quiet; then
            echo "変更なし"
          else
            git commit -m "data: account-timeline + buzz-references update $(date -u +%Y-%m-%dT%H:%MZ)"
            git push || (git pull --rebase && git push)
          fi
