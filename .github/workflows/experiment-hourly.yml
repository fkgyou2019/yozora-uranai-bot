name: Auto Post (1日7件・ゴールデンタイム最適化)

on:
  schedule:
    # 7スロット: 06:07 / 07:07 / 08:07 / 09:37 / 12:07 / 18:07 / 20:07 JST (UTC = JST - 9h)
    # 2026-04-14確定: ゴールデンタイム完全対応版
    # ※ GitHub Actionsのcronは最大15分遅延あり。post-verifyが実際の投稿を担保する
    - cron: '7 21 * * *'   #  6:07 JST (朝ゴールデン先頭・めざまし型)
    - cron: '7 22 * * *'   #  7:07 JST (朝ゴールデン中心・通勤開始・天体根拠型)
    - cron: '7 23 * * *'   #  8:07 JST (朝ゴールデン末尾・通勤ピーク・しいたけ共感型)
    - cron: '37 0 * * *'   #  9:37 JST (第2ゴールデン内・仕事アドバイス型)
    - cron: '7 3 * * *'    # 12:07 JST (昼休み・スピ×ラッキー型)
    - cron: '7 9 * * *'    # 18:07 JST (夕方ゴールデン・哲学深掘り型)
    - cron: '7 11 * * *'   # 20:07 JST (夜ゴールデン・夜恋愛型)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: hourly-experiment
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python

        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Initialize state files if missing

        run: |
          mkdir -p state config
          if [ ! -f state/post-queue.json ]; then
            echo '{"queue":[]}' > state/post-queue.json
          fi
          if [ ! -f state/post-history.json ]; then
            echo '{"posts":[]}' > state/post-history.json
          fi
          if [ ! -f state/system-status.json ]; then
            cat > state/system-status.json << 'EOJSON'
          {
            "kill_switch": false,
            "consecutive_errors": 0,
            "daily_post_count": 0,
            "daily_post_date": "",
            "agents": {
              "researcher": {"status": "idle", "last_run": null, "error_count": 0},
              "analyst": {"status": "idle", "last_run": null, "error_count": 0},
              "writer": {"status": "idle", "last_run": null, "error_count": 0},
              "poster": {"status": "idle", "last_run": null, "error_count": 0},
              "fetcher": {"status": "idle", "last_run": null, "error_count": 0},
              "supervisor": {"status": "idle", "last_run": null, "error_count": 0}
            }
          }
          EOJSON
          fi
          [ ! -f state/performance-data.json ] && echo '{"posts":[],"last_updated":null}' > state/performance-data.json
          [ ! -f state/winning-patterns.json ] && echo '{}' > state/winning-patterns.json
          true

      - name: Create api-keys.env from secrets

        run: |
          cat > config/api-keys.env << EOF
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          THREADS_ACCESS_TOKEN=${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID=${{ secrets.THREADS_USER_ID }}
          EOF

      - name: Flush non-experiment posts from queue

        run: |
          python -c "
          import json, os
          VALID_STRUCTURES = {'G', 'H', 'C', 'F', 'J'}  # 新7スロット対応: J/C/H/G/F の全コンテンツタイプを許可
          path = 'state/post-queue.json'
          q = json.load(open(path, encoding='utf-8')) if os.path.exists(path) else {'queue': []}
          before = len([p for p in q.get('queue', []) if p.get('status') == 'queued'])
          def is_experiment(p):
              pattern = p.get('pattern_name', '')
              for s in VALID_STRUCTURES:
                  if f'構造{s}' in pattern:
                      return True
              return False
          q['queue'] = [p for p in q.get('queue', []) if p.get('status') != 'queued' or is_experiment(p)]
          after = len([p for p in q.get('queue', []) if p.get('status') == 'queued'])
          flushed = before - after
          if flushed > 0:
              json.dump(q, open(path, 'w', encoding='utf-8'), ensure_ascii=False, indent=2)
              print(f'[FLUSH] 非実験投稿 {flushed}件を削除 (残{after}件)')
          else:
              print(f'[FLUSH] フラッシュ不要 (キュー残{after}件はすべて実験パターン)')
          "

      - name: Pre-fill queue if empty (before posting)

        run: |
          REMAINING=$(python -c "
          import json, os
          path = 'state/post-queue.json'
          q = json.load(open(path)) if os.path.exists(path) else {'queue': []}
          print(len([p for p in q.get('queue', []) if p.get('status') == 'queued']))
          " 2>/dev/null || echo "0")
          echo "現在のキュー残: ${REMAINING}件"
          if [ "$REMAINING" -lt "6" ]; then
            echo "キュー残${REMAINING}件（6件未満）→ 生成します"
            EXPERIMENT_MODE=1 python .github/scripts/generate_posts.py
            python .github/scripts/quality_check.py || true
            NEW_REMAINING=$(python -c "
          import json, os
          path = 'state/post-queue.json'
          q = json.load(open(path)) if os.path.exists(path) else {'queue': []}
          print(len([p for p in q.get('queue', []) if p.get('status') == 'queued']))
          " 2>/dev/null || echo "0")
            echo "生成後キュー残: ${NEW_REMAINING}件"
          else
            echo "キューに${REMAINING}件あり → 生成スキップ"
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        continue-on-error: true

      - name: Post one from queue

        run: python agents/poster.py
        env:
          PYTHONIOENCODING: utf-8
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          SCHEDULED_POST: "1"

      - name: Fetch metrics & analyze (learning loop)

        run: |
          python .github/scripts/fetch_metrics.py
          python .github/scripts/analyze_patterns.py
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        continue-on-error: true

      - name: Generate daily report JSON

        run: python .github/scripts/generate_daily_report.py
        continue-on-error: true

      - name: Commit state changes

        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/post-queue.json state/post-history.json state/system-status.json state/performance-data.json state/winning-patterns.json state/metrics.json state/daily-report.json
          if git diff --cached --quiet; then
            echo "No state changes to commit"
          else
            git commit -m "chore: update post state [skip ci]"
            git push || (
              git fetch origin master
              git merge origin/master -X ours --no-edit
              git push
            )
          fi
