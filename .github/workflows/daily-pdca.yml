name: Daily PDCA Cycle

on:
  schedule:
    - cron: '30 12 * * *'  # JST 21:30（daily-report 21:05の25分後）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pdca:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install gspread google-auth

      - name: Run daily PDCA cycle
        run: python .github/scripts/daily_pdca_cycle.py
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}

      - name: Commit updated strategy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/winning-patterns.json state/pdca-action-log.json
          if git diff --staged --quiet; then
            echo "変更なし"
          else
            git pull --rebase origin master || true
            git commit -m "chore: daily PDCA cycle - winning-patterns updated [skip ci]"
            git push || (git pull --rebase && git push)
          fi
