name: Post Verify & Retry

on:
  schedule:
    # 各投稿スロットの15分後に自動チェック（GitHub cron遅延考慮）
    # JST = UTC + 9h  / スロット時刻+15min
    - cron: '22 21 * * *'   #  6:22 JST (スロット1: 06:07の15分後)
    - cron: '22 22 * * *'   #  7:22 JST (スロット2: 07:07の15分後)
    - cron: '22 23 * * *'   #  8:22 JST (スロット3: 08:07の15分後)
    - cron: '52 0 * * *'    #  9:52 JST (スロット4: 09:37の15分後)
    - cron: '22 3 * * *'    # 12:22 JST (スロット5: 12:07の15分後)
    - cron: '22 9 * * *'    # 18:22 JST (スロット6: 18:07の15分後)
    - cron: '22 11 * * *'   # 20:22 JST (スロット7: 20:07の15分後)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: post-verify
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check active period (JST 2026-03-31 ~ 2026-04-30)
        id: period_check
        run: |
          JST_DATE=$(TZ='Asia/Tokyo' date +%Y-%m-%d)
          if [[ "$JST_DATE" < "2026-03-31" || "$JST_DATE" > "2026-04-30" ]]; then
            echo "稼働期間外 ($JST_DATE)。スキップします。"
            echo "in_period=false" >> $GITHUB_OUTPUT
          else
            echo "稼働期間内 ($JST_DATE)。検証を実行します。"
            echo "in_period=true" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository
        if: steps.period_check.outputs.in_period == 'true'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        if: steps.period_check.outputs.in_period == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Initialize state files if missing
        if: steps.period_check.outputs.in_period == 'true'
        run: |
          mkdir -p state config
          [ ! -f state/post-queue.json ] && echo '{"queue":[]}' > state/post-queue.json
          [ ! -f state/post-history.json ] && echo '{"posts":[]}' > state/post-history.json
          [ ! -f state/system-status.json ] && echo '{"kill_switch":false,"consecutive_errors":0,"daily_post_count":0,"daily_post_date":"","agents":{"poster":{"status":"idle","last_run":null,"error_count":0}}}' > state/system-status.json
          true

      - name: Verify & retry post if needed
        if: steps.period_check.outputs.in_period == 'true'
        run: python .github/scripts/verify_post.py
        env:
          PYTHONIOENCODING: utf-8
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit state changes
        if: steps.period_check.outputs.in_period == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin master || true
          git add state/post-queue.json state/post-history.json state/system-status.json
          if git diff --cached --quiet; then
            echo "No state changes to commit"
          else
            git commit -m "chore: post-verify state update [skip ci]"
            git push || (git pull --rebase origin master && git push)
          fi
