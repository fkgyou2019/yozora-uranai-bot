name: Comment Marketing (コメント営業)

on:
  schedule:
    # JST 8:00, 10:30, 13:00, 15:30, 18:00, 20:30 の6回/日
    # 3コメント×6回 = 最大18件/日（余裕を持たせた設計）
    - cron: '0 23 * * *'   # JST 08:00
    - cron: '30 1 * * *'   # JST 10:30
    - cron: '0 4 * * *'    # JST 13:00
    - cron: '30 6 * * *'   # JST 15:30
    - cron: '0 9 * * *'    # JST 18:00
    - cron: '30 11 * * *'  # JST 20:30
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: comment-marketing
  cancel-in-progress: false

jobs:
  # ========================================
  # 実験期間チェック（4/6-4/30は停止：Threads APIが他ユーザー投稿を返さず機能不全のため）
  # ========================================
  check-period:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - name: Check if experiment period (2026-04-06 to 2026-04-30)
        id: check
        run: |
          JST_DATE=$(TZ='Asia/Tokyo' date +%Y-%m-%d)
          if [[ "$JST_DATE" > "2026-04-05" && "$JST_DATE" < "2026-05-01" ]]; then
            echo "実験期間中（${JST_DATE}）: comment-marketing はスキップします（Threads API制限により機能不全）。"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "実験期間外（${JST_DATE}）: comment-marketing を実行します。"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

  comment:
    needs: check-period
    if: needs.check-period.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Initialize state
        run: |
          mkdir -p state
          if [ ! -f state/comment-marketing.json ]; then
            echo '{"daily_count":0,"daily_date":"","total_count":0,"paused_until":null,"our_username":null,"commented_post_ids":[],"recent_comments":[],"last_run":null}' > state/comment-marketing.json
          fi

      - name: Run comment marketing
        run: python .github/scripts/comment_marketing.py
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Run comment monitor (error detection & auto-delete)
        run: python .github/scripts/comment_monitor.py
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}

      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/comment-marketing.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git pull --rebase origin master || true
            git commit -m "chore: update comment marketing state [skip ci]" || true
            git push || echo "Push failed (will retry next run)"
          fi
