name: Auto Reply to Comments

on:
  schedule:
    # 投稿スケジュールの30分後に返信チェック（1日8回）
    - cron: '37 22 * * *'  # JST 07:37
    - cron: '37 0 * * *'   # JST 09:37
    - cron: '7 2 * * *'    # JST 11:07
    - cron: '37 3 * * *'   # JST 12:37
    - cron: '37 6 * * *'   # JST 15:37
    - cron: '37 10 * * *'  # JST 19:37
    - cron: '7 12 * * *'   # JST 21:07
    - cron: '7 13 * * *'   # JST 22:07
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-reply
  cancel-in-progress: true

jobs:
  reply:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Initialize state
        run: |
          mkdir -p state
          [ ! -f state/replied-comments.json ] && echo '{"replied_ids":[],"last_checked":null}' > state/replied-comments.json
          true

      - name: Auto reply to comments
        run: python .github/scripts/auto_reply.py
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/replied-comments.json state/comment-log.json
          if git diff --cached --quiet; then
            echo "No new replies"
          else
            git pull --rebase origin master || true
            git commit -m "chore: update replied comments [skip ci]" || true
            git push || echo "Push failed (conflict), will retry next run"
          fi
