name: Daily Analysis Report

on:
  schedule:
    # 7:07 JST = 22:07 UTC (前日)
    - cron: '7 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create api-keys.env from secrets
        run: |
          mkdir -p config
          cat > config/api-keys.env << EOF
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          THREADS_ACCESS_TOKEN=${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID=${{ secrets.THREADS_USER_ID }}
          EOF

      - name: Run daily analysis
        run: python .github/scripts/daily_analysis.py
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        continue-on-error: false

      - name: Run PDCA health check
        run: python .github/scripts/pdca_check.py
        continue-on-error: true

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/reports/ state/pdca-health.json state/pdca-alerts.json state/pdca-score-history.json
          if git diff --cached --quiet; then
            echo "No report to commit"
          else
            git commit -m "chore: daily analysis report $(TZ='Asia/Tokyo' date +%Y-%m-%d) [skip ci]"
            git push || (
              git fetch origin master
              git merge origin/master -X ours --no-edit
              git push
            )
          fi
