name: Reply Quality Check

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: reply-check
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create api-keys.env
        run: |
          mkdir -p config
          cat > config/api-keys.env << 'ENVEOF'
          THREADS_ACCESS_TOKEN=${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID=${{ secrets.THREADS_USER_ID }}
          ENVEOF

      - name: Run reply checker
        run: python .github/scripts/reply_checker.py
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}

      - name: Commit state changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/reply-check-log.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git pull --rebase origin master || true
            git commit -m "chore: update reply check log [skip ci]" || true
            git push || echo "Push failed (conflict), will retry next run"
          fi
