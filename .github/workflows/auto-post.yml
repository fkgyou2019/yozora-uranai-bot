name: Auto Post to Threads

on:
  schedule:
    # GitHub Actionsのcronは30-60%がスキップされるため、冗長スロットを追加
    # 投稿間隔ガード（3600秒）が重複投稿を防ぐので、多めにトリガーしても安全
    # UTC = JST - 9h
    # --- メインスロット（8件/日の目標投稿時刻）---
    - cron: '47 21 * * *'  # → JST 06:47→07:07頃 🌅 朝一
    - cron: '47 23 * * *'  # → JST 08:47→09:07頃 💼 出社後
    - cron: '17 1 * * *'   # → JST 10:17→10:37頃 🏠 主婦
    - cron: '47 2 * * *'   # → JST 11:47→12:07頃 🍱 ランチ
    - cron: '47 5 * * *'   # → JST 14:47→15:07頃 ☕ 午後
    - cron: '47 9 * * *'   # → JST 18:47→19:07頃 🌆 帰宅後
    - cron: '17 11 * * *'  # → JST 20:17→20:37頃 🌙 ゴールデン
    - cron: '17 12 * * *'  # → JST 21:17→21:37頃 🛏 寝かしつけ後
    # --- 補完スロット（メインが発火しなかった場合の保険）---
    - cron: '20 22 * * *'  # → JST 07:20→07:40頃（朝の補完）
    - cron: '20 0 * * *'   # → JST 09:20→09:40頃（出社後の補完）
    - cron: '50 1 * * *'   # → JST 10:50→11:10頃（主婦の補完）
    - cron: '20 3 * * *'   # → JST 12:20→12:40頃（ランチの補完）
    - cron: '20 6 * * *'   # → JST 15:20→15:40頃（午後の補完）
    - cron: '20 10 * * *'  # → JST 19:20→19:40頃（帰宅後の補完）
    - cron: '50 11 * * *'  # → JST 20:50→21:10頃（ゴールデンの補完）
    - cron: '50 12 * * *'  # → JST 21:50→22:10頃（寝かしつけの補完）
  workflow_dispatch:  # 手動実行も可能

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Initialize state files if missing
        run: |
          mkdir -p state
          if [ ! -f state/post-queue.json ]; then
            echo '{"queue":[]}' > state/post-queue.json
          fi
          if [ ! -f state/post-history.json ]; then
            echo '{"posts":[]}' > state/post-history.json
          fi
          if [ ! -f state/system-status.json ]; then
            cat > state/system-status.json << 'EOJSON'
          {
            "kill_switch": false,
            "consecutive_errors": 0,
            "daily_post_count": 0,
            "daily_post_date": "",
            "agents": {
              "researcher": {"status": "idle", "last_run": null, "error_count": 0},
              "analyst": {"status": "idle", "last_run": null, "error_count": 0},
              "writer": {"status": "idle", "last_run": null, "error_count": 0},
              "poster": {"status": "idle", "last_run": null, "error_count": 0},
              "fetcher": {"status": "idle", "last_run": null, "error_count": 0},
              "supervisor": {"status": "idle", "last_run": null, "error_count": 0}
            }
          }
          EOJSON
          fi

      - name: Create api-keys.env from secrets
        run: |
          cat > config/api-keys.env << EOF
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          THREADS_ACCESS_TOKEN=${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID=${{ secrets.THREADS_USER_ID }}
          EOF

      - name: Initialize learning state files
        run: |
          [ ! -f state/performance-data.json ] && echo '{"posts":[],"last_updated":null}' > state/performance-data.json
          [ ! -f state/winning-patterns.json ] && echo '{}' > state/winning-patterns.json
          true

      - name: Fetch metrics & analyze (learning loop)
        run: |
          python .github/scripts/fetch_metrics.py
          python .github/scripts/analyze_patterns.py
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}

      - name: Generate posts if queue is empty
        run: python .github/scripts/generate_posts.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Quality check (rule-based, not AI self-score)
        run: python .github/scripts/quality_check.py
        continue-on-error: true

      - name: Regenerate if queue empty after quality check
        run: |
          REMAINING=$(python -c "import json; q=json.load(open('state/post-queue.json')); print(len([p for p in q.get('queue',[]) if p.get('status')=='queued']))")
          if [ "$REMAINING" = "0" ]; then
            echo "品質チェック後にキューが空。再生成します..."
            python .github/scripts/generate_posts.py
            python .github/scripts/quality_check.py || true
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Create x-accounts.json from secret
        run: |
          if [ -n "$X_ACCOUNTS_JSON" ]; then
            echo "$X_ACCOUNTS_JSON" > config/x-accounts.json
          fi
        env:
          X_ACCOUNTS_JSON: ${{ secrets.X_ACCOUNTS_JSON }}

      - name: Post one from queue
        run: python agents/poster.py
        env:
          PYTHONIOENCODING: utf-8
          X_ACCOUNTS_JSON: ${{ secrets.X_ACCOUNTS_JSON }}

      - name: Commit state changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin master || true
          git add state/
          if git diff --cached --quiet; then
            echo "No state changes to commit"
          else
            git commit -m "chore: update post state [skip ci]"
            git push || (git pull --rebase origin master && git push)
          fi
