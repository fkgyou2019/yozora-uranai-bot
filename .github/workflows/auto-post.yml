name: Auto Post to Threads

on:
  # cron-job.org から workflow_dispatch で確実にトリガー（100%発火）
  # スケジュール: 07:07, 09:07, 10:37, 12:07, 15:07, 19:07, 20:37, 21:37 JST
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Initialize state files if missing
        run: |
          mkdir -p state config
          if [ ! -f state/post-queue.json ]; then
            echo '{"queue":[]}' > state/post-queue.json
          fi
          if [ ! -f state/post-history.json ]; then
            echo '{"posts":[]}' > state/post-history.json
          fi
          if [ ! -f state/system-status.json ]; then
            cat > state/system-status.json << 'EOJSON'
          {
            "kill_switch": false,
            "consecutive_errors": 0,
            "daily_post_count": 0,
            "daily_post_date": "",
            "agents": {
              "researcher": {"status": "idle", "last_run": null, "error_count": 0},
              "analyst": {"status": "idle", "last_run": null, "error_count": 0},
              "writer": {"status": "idle", "last_run": null, "error_count": 0},
              "poster": {"status": "idle", "last_run": null, "error_count": 0},
              "fetcher": {"status": "idle", "last_run": null, "error_count": 0},
              "supervisor": {"status": "idle", "last_run": null, "error_count": 0}
            }
          }
          EOJSON
          fi
          [ ! -f state/performance-data.json ] && echo '{"posts":[],"last_updated":null}' > state/performance-data.json
          [ ! -f state/winning-patterns.json ] && echo '{}' > state/winning-patterns.json
          true

      - name: Create api-keys.env from secrets
        run: |
          cat > config/api-keys.env << EOF
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          THREADS_ACCESS_TOKEN=${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID=${{ secrets.THREADS_USER_ID }}
          EOF

      - name: Create x-accounts.json from secret
        run: |
          if [ -n "$X_ACCOUNTS_JSON" ]; then
            echo "$X_ACCOUNTS_JSON" > config/x-accounts.json
          fi
        env:
          X_ACCOUNTS_JSON: ${{ secrets.X_ACCOUNTS_JSON }}

      # ========================================
      # キューが空なら先に補充（朝一スロット対策: poster.py実行前に補充）
      # ★ これがないと朝の最初のスロットでキューが空→投稿なし→post-verifyが代替投稿
      # ========================================
      - name: Pre-fill queue if empty (before posting)
        run: |
          REMAINING=$(python -c "
          import json, os
          path = 'state/post-queue.json'
          q = json.load(open(path)) if os.path.exists(path) else {'queue': []}
          print(len([p for p in q.get('queue', []) if p.get('status') == 'queued']))
          " 2>/dev/null || echo "0")
          echo "現在のキュー残: ${REMAINING}件"
          if [ "$REMAINING" = "0" ]; then
            echo "キューが空 → ポスト前に生成します"
            EXPERIMENT_MODE=1 python .github/scripts/generate_posts.py
            python .github/scripts/quality_check.py || true
            NEW_REMAINING=$(python -c "
          import json, os
          path = 'state/post-queue.json'
          q = json.load(open(path)) if os.path.exists(path) else {'queue': []}
          print(len([p for p in q.get('queue', []) if p.get('status') == 'queued']))
          " 2>/dev/null || echo "0")
            echo "生成後キュー残: ${NEW_REMAINING}件"
          else
            echo "キューに投稿あり → 生成スキップ"
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        continue-on-error: true

      # ========================================
      # 投稿を最優先で実行（タイムラグ解消）
      # ========================================
      - name: Post one from queue (最優先)
        run: python agents/poster.py
        env:
          PYTHONIOENCODING: utf-8
          X_ACCOUNTS_JSON: ${{ secrets.X_ACCOUNTS_JSON }}

      # ========================================
      # 学習ループは投稿後に実行（失敗しても投稿に影響しない）
      # ========================================
      - name: Fetch metrics & analyze (learning loop)
        run: |
          python .github/scripts/fetch_metrics.py
          python .github/scripts/analyze_patterns.py
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        continue-on-error: true

      - name: Generate posts if queue is empty
        run: EXPERIMENT_MODE=1 python .github/scripts/generate_posts.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        continue-on-error: true

      - name: Quality check (rule-based)
        run: python .github/scripts/quality_check.py
        continue-on-error: true

      - name: Regenerate if queue empty after quality check
        run: |
          REMAINING=$(python -c "import json; q=json.load(open('state/post-queue.json')); print(len([p for p in q.get('queue',[]) if p.get('status')=='queued']))")
          if [ "$REMAINING" = "0" ]; then
            echo "品質チェック後にキューが空。再生成します..."
            EXPERIMENT_MODE=1 python .github/scripts/generate_posts.py
            python .github/scripts/quality_check.py || true
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        continue-on-error: true

      - name: Commit state changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/post-queue.json state/post-history.json state/system-status.json state/performance-data.json state/winning-patterns.json state/metrics.json
          if git diff --cached --quiet; then
            echo "No state changes to commit"
          else
            git commit -m "chore: update post state [skip ci]"
            # 競合時は自分の変更を優先してマージ（-X ours）
            git push || (
              git fetch origin master
              git merge origin/master -X ours --no-edit
              git push
            )
          fi
